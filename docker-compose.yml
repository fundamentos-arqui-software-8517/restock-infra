services:
  mongodb:
    image: mongo:7
    container_name: restock-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ${MONGODB_DATABASE}
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    networks:
      - restock-net

  redis:
    image: redis:7-alpine
    container_name: restock-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - restock-net

  backend:
    image: ${BACKEND_IMAGE}
    container_name: restock-backend
    restart: unless-stopped
    depends_on:
      - mongodb
      - redis
    ports:
      - "${PORT}:8080"
    environment:
      PORT: 8080
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DATABASE: ${MONGODB_DATABASE}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_DAYS: ${JWT_EXPIRATION_DAYS}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
    networks:
      - restock-net

volumes:
  mongodb-data:
  redis-data:

networks:
  restock-net:
    driver: bridge