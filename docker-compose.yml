services:
  mongodb:
    image: mongo:7
    container_name: restock-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ${MONGODB_DATABASE}
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    networks:
      - restock-net

  redis:
    image: redis:7-alpine
    container_name: restock-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - restock-net

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: restock-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    networks:
      - restock-net

  backend-1:
    image: ${BACKEND_IMAGE}
    container_name: restock-backend-1
    restart: unless-stopped
    depends_on:
      - mongodb
      - redis
      - mosquitto
    expose:
      - "8080"
    environment:
      PORT: 8080
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DATABASE: ${MONGODB_DATABASE}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_DAYS: ${JWT_EXPIRATION_DAYS}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      MQTT_ENABLED: ${MQTT_ENABLED}
      MQTT_BROKER_URL: ${MQTT_BROKER_URL}
    networks:
      - restock-net

  backend-2:
    image: ${BACKEND_IMAGE}
    container_name: restock-backend-2
    restart: unless-stopped
    depends_on:
      - mongodb
      - redis
      - mosquitto
    expose:
      - "8080"
    environment:
      PORT: 8080
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DATABASE: ${MONGODB_DATABASE}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_DAYS: ${JWT_EXPIRATION_DAYS}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      MQTT_ENABLED: ${MQTT_ENABLED}
      MQTT_BROKER_URL: ${MQTT_BROKER_URL}
    networks:
      - restock-net

  nginx:
    image: nginx:alpine
    container_name: restock-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ../restock-web-application/dist/restock-web-application/browser:/usr/share/nginx/html:ro
    depends_on:
      - backend-1
      - backend-2
      - mosquitto
    networks:
      - restock-net

volumes:
  mongodb-data:
  redis-data:
  mosquitto-data:
  mosquitto-log:

networks:
  restock-net:
    driver: bridge