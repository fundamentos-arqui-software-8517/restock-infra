services:
  redis:
    image: redis:7-alpine
    container_name: restock-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - restock-net

  backend-1:
    image: ${BACKEND_IMAGE}
    container_name: restock-backend-1
    restart: unless-stopped
    depends_on:
      - redis
    expose:
      - "8080"
    environment:
      PORT: 8080
      MONGODB_URI: ${MONGODB_URI}
      MONGODB_DATABASE: ${MONGODB_DATABASE}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_DAYS: ${JWT_EXPIRATION_DAYS}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      INTEGRATIONS_FCM_ENABLED: ${INTEGRATIONS_FCM_ENABLED:-false}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-dummy}
      FIREBASE_CREDENTIALS_BASE64: ${FIREBASE_CREDENTIALS_BASE64:-dummy}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-dummy}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-dummy}
      STRIPE_SUCCESS_URL: ${STRIPE_SUCCESS_URL:-http://localhost:4200/subscriptions/success}
      STRIPE_CANCEL_URL: ${STRIPE_CANCEL_URL:-http://localhost:4200/subscriptions/cancel}
      EDGE_SERVICE_URL: ${EDGE_SERVICE_URL}
    networks:
      - restock-net

  backend-2:
    image: ${BACKEND_IMAGE}
    container_name: restock-backend-2
    restart: unless-stopped
    depends_on:
      - redis
    expose:
      - "8080"
    environment:
      PORT: 8080
      MONGODB_URI: ${MONGODB_URI}
      MONGODB_DATABASE: ${MONGODB_DATABASE}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_DAYS: ${JWT_EXPIRATION_DAYS}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      INTEGRATIONS_FCM_ENABLED: ${INTEGRATIONS_FCM_ENABLED:-false}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-dummy}
      FIREBASE_CREDENTIALS_BASE64: ${FIREBASE_CREDENTIALS_BASE64:-dummy}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-dummy}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-dummy}
      STRIPE_SUCCESS_URL: ${STRIPE_SUCCESS_URL:-http://localhost:4200/subscriptions/success}
      STRIPE_CANCEL_URL: ${STRIPE_CANCEL_URL:-http://localhost:4200/subscriptions/cancel}
      EDGE_SERVICE_URL: ${EDGE_SERVICE_URL}
    networks:
      - restock-net

  frontend:
    image: ${FRONTEND_IMAGE}
    container_name: restock-frontend
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - restock-net

  nginx:
    image: nginx:alpine
    container_name: restock-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend-1
      - backend-2
      - frontend
    networks:
      - restock-net

volumes:
  redis-data:

networks:
  restock-net:
    driver: bridge
